<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Applicant Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    <script defer src="{{ url_for('static', path='/js/app.js') }}"></script>
</head>
<body class="app-page">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">CreditIntel</a>
            <span class="navbar-text">Assessment</span>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-xl-10">
                <div class="page-title mb-4">
                    <span class="eyebrow">Applicant Intake</span>
                    <h1>Credit Risk Assessment</h1>
                </div>

                <form class="needs-validation" action="{{ url_for('submit_assessment') }}" method="post" novalidate>
                    <div class="card form-shell border-0 shadow-lg">
                        <div class="card-body p-4 p-md-5">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Gender</label>
                                    <select class="form-select form-select-lg" name="gender" required>
                                        <option value="F">Female</option>
                                        <option value="M">Male</option>
                                        <option value="XNA">Other / Not disclosed</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Age</label>
                                    <input class="form-control form-control-lg" name="age" type="number" min="18" max="100" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Annual Income</label>
                                    <input class="form-control form-control-lg" name="annual_income" type="number" min="1" step="0.01" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Loan Amount</label>
                                    <input class="form-control form-control-lg" name="loan_amount" type="number" min="1" step="0.01" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Annuity Amount</label>
                                    <input class="form-control form-control-lg" name="annuity_amount" type="number" min="1" step="0.01" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Employment Days</label>
                                    <input class="form-control form-control-lg" name="employment_days" type="number" min="0" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Number of Children</label>
                                    <input class="form-control form-control-lg" name="children" type="number" min="0" max="20" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Family Members</label>
                                    <input class="form-control form-control-lg" name="family_members" type="number" min="1" max="30" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end mt-5">
                                <button class="btn btn-primary btn-lg px-5" type="submit">Generate Result</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
