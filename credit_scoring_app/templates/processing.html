<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Processing Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    <script defer src="{{ url_for('static', path='/js/app.js') }}"></script>
</head>
<body class="processing-page" data-result-url="{{ url_for('result', result_id=result_id) }}">
    <main class="processing-shell">
        <section class="glass-card processing-card">
            <div class="risk-orbit">
                <span></span>
            </div>
            <h1>Processing Assessment</h1>
            <p class="text-white-50">The intelligence pipeline is preparing the final risk profile.</p>
            <div class="progress mt-4" role="progressbar" aria-label="Processing progress">
                <div class="progress-bar" data-progress-bar style="width: 10%"></div>
            </div>
            <ul class="status-list mt-4" data-status-list>
                <li class="active">Loading Model</li>
                <li>Feature Engineering</li>
                <li>Risk Assessment</li>
                <li>Generating Result</li>
            </ul>
        </section>
    </main>
</body>
</html>
